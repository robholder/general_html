<div id="Pulling All Branches From Remote"><h1 id="Pulling All Branches From Remote" class="header"><a href="#Pulling All Branches From Remote">Pulling All Branches From Remote</a></h1></div>

<p>
Get a list of remote branches:
</p>
<pre bash>
git branch -a
</pre>

<p>
Switch to each branch listed, and run:
</p>
<pre bash>
git switch &lt;branch name&gt;
</pre>

<p>
Do this for all branches.
</p>

<p>
You need to switch each time before pulls and pushes (unless an alias or loop is used to automate).
</p>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            if (window.Prism) {
                // Point autoloader to the CDN components
                Prism.plugins.autoloader.languages_path = 'https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/';
                
                document.querySelectorAll("pre").forEach(pre => {
                    // Identify language from Vimwiki's <pre lang> attribute
                    let lang = pre.getAttributeNames().find(a => !["class", "style", "id"].includes(a)) || "text";
                    pre.className = "language-" + lang;
                    
                    // Ensure the <code> wrapper exists for Prism
                    if (!pre.querySelector("code")) {
                        const code = document.createElement("code");
                        code.className = "language-" + lang;
                        code.innerHTML = pre.innerHTML;
                        pre.innerHTML = "";
                        pre.appendChild(code);
                    }
                });
                // Final highlight pass
                Prism.highlightAll();
            }
        });
    </script>
</body>
