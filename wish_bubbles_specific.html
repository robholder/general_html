    <script>
    document.addEventListener("DOMContentLoaded", function() {
        if (window.Prism) {
            Prism.plugins.autoloader.languages_path = 'https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/';
            
            document.querySelectorAll("pre").forEach(pre => {
                // 1. Get all attributes except standard ones
                const attrs = pre.getAttributeNames().filter(a => !["class", "style", "id"].includes(a));
                
                // 2. Identify the language (the first attribute that ISN'T "line-numbers")
                let lang = attrs.find(a => a !== "line-numbers") || "text";
                
                // 3. Check if "line-numbers" exists as an attribute OR was passed in the {{{}}}
                const hasLineNumbers = pre.hasAttribute("line-numbers") || attrs.includes("line-numbers");
                
                // 4. Apply classes to <pre>
                pre.classList.add("language-" + lang);
                if (hasLineNumbers) {
                    pre.classList.add("line-numbers");
                }
                
                // 5. Build the <code> block if missing
                if (!pre.querySelector("code")) {
                    const code = document.createElement("code");
                    code.className = "language-" + lang;
                    code.innerHTML = pre.innerHTML;
                    pre.innerHTML = "";
                    pre.appendChild(code);
                }
            });
            
            // 6. Tell Prism to re-scan the DOM for the new classes
            Prism.highlightAll();
        }
    });
    </script>
